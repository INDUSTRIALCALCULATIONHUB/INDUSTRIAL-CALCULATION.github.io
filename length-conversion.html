<div class="wrapper">

<div class="card">

<h2>Length Conversion Tool</h2>

<input type="number" id="inputValue" placeholder="Enter Value">

<select id="unit">
    <option value="m">Meter (m)</option>
    <option value="mm">Millimeter (mm)</option>
    <option value="cm">Centimeter (cm)</option>
    <option value="km">Kilometer (km)</option>
    <option value="in">Inch (in)</option>
    <option value="ft">Foot (ft)</option>
    <option value="yd">Yard (yd)</option>
</select>

<div style="text-align:center;">
<button class="calc-btn" onclick="calculate()">Calculate</button>
<button class="reset-btn" onclick="resetForm()">Reset</button>
</div>

<div class="output" id="output"></div>

</div>

</div>

</footer>

<script>

const TO_METER = {
    m: 1,
    mm: 0.001,
    cm: 0.01,
    km: 1000,
    in: 0.0254,
    ft: 0.3048,
    yd: 0.9144
};

function calculate(){

let value = parseFloat(document.getElementById("inputValue").value);
let unit = document.getElementById("unit").value;

if(isNaN(value)){
    document.getElementById("output").innerHTML =
    "<div class='result-card' style='color:red;'>Please enter valid value</div>";
    return;
}

let meter = value * TO_METER[unit];

let results = {
"Meter (m)": meter,
"Millimeter (mm)": meter / 0.001,
"Centimeter (cm)": meter / 0.01,
"Kilometer (km)": meter / 1000,
"Inch (in)": meter / 0.0254,
"Foot (ft)": meter / 0.3048,
"Yard (yd)": meter / 0.9144
};

let table = `<div class='result-card'><h3>Conversion Results</h3><table>
<tr><th>Unit</th><th>Value</th></tr>`;

for(let k in results){
table += `<tr><td>${k}</td><td>${results[k].toFixed(4)}</td></tr>`;
}

table += `</table></div>`;

document.getElementById("output").innerHTML = table;
}

function resetForm(){
document.getElementById("inputValue").value="";
document.getElementById("unit").value="m";
document.getElementById("output").innerHTML="";
}

</script>
