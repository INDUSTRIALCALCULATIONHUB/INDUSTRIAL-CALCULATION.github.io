<body>

<!-- FIXED HEADER -->
<div class="header-bar">
🧰 Plate Weight Calculator |
<a href="index.html">Home</a>

<!-- MAIN CONTAINER -->
<div class="container">

<h2>📐 Plate Weight Calculator</h2>

<label>Plate Shape</label>
<select id="shape" onchange="renderInputs()">
<option value="rect">Rectangular</option>
<option value="circular">Circular</option>
</select>

<div id="inputs"></div>

<label>Thickness (mm)</label>
<input type="number" id="thk">

<label>Material Density (kg/m³)</label>
<select id="density">
<option value="7850">Steel</option>
<option value="8000">Stainless Steel</option>
<option value="2700">Aluminium</option>
<option value="8900">Copper</option>
<option value="8500">Brass</option>
</select>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

</div>

<!-- FIXED FOOTER -->
<div class="footer-bar">
© 2026 Industrial Calculation Hub
</div>

<!-- CMP CONSENT BANNER -->
<div id="consent-banner">
<p>This website uses cookies for analytics and personalized ads.</p>
<button class="accept" onclick="acceptConsent()">Accept</button>
<button class="reject" onclick="rejectConsent()">Reject</button>
<button class="manage" onclick="manageConsent()">Manage</button>
</div>

<script>

function renderInputs(){
    let shape = document.getElementById("shape").value;
    let html = "";

    if(shape === "rect"){
        html = `
        <label>Length (m)</label>
        <input type="number" id="L">

        <label>Width (m)</label>
        <input type="number" id="W">
        `;
    }
    else{
        html = `
        <label>Diameter (m)</label>
        <input type="number" id="D">
        `;
    }

    document.getElementById("inputs").innerHTML = html;
}

function calculate(){

    let shape = document.getElementById("shape").value;
    let thk = parseFloat(document.getElementById("thk").value) / 1000;
    let density = parseFloat(document.getElementById("density").value);

    if(isNaN(thk)){
        document.getElementById("result").innerHTML = "Please enter valid thickness";
        return;
    }

    let area = 0;

    if(shape === "rect"){
        let L = parseFloat(document.getElementById("L").value);
        let W = parseFloat(document.getElementById("W").value);
        area = L * W;
    }
    else{
        let D = parseFloat(document.getElementById("D").value);
        area = Math.PI * D * D / 4;
    }

    let volume = area * thk;
    let weight = volume * density;

    document.getElementById("result").innerHTML =
        "Surface Area = " + area.toFixed(2) + " m²<br>" +
        "Volume = " + volume.toFixed(4) + " m³<br>" +
        "Weight = " + weight.toFixed(2) + " kg";
}

/* CMP */
function showBanner(){
    if(!localStorage.getItem("consent")){
        document.getElementById("consent-banner").style.display="block";
    }
}

function acceptConsent(){
    localStorage.setItem("consent","accepted");
    document.getElementById("consent-banner").style.display="none";
}

function rejectConsent(){
    localStorage.setItem("consent","rejected");
    document.getElementById("consent-banner").style.display="none";
}

function manageConsent(){
    alert("Redirect to privacy settings page.");
}

window.onload = function(){
    renderInputs();
    showBanner();
};

</script>
