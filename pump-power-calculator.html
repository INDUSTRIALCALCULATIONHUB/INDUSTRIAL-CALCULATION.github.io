<head>
<meta charset="UTF-8">

<title>Pump Power Calculator | Industrial Calculation Hub</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    color: #333;
}

.navbar {
    text-align: center;
    background: #444;
    padding: 12px;
}

.navbar a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

.header {
    text-align: center;
    padding: 30px;
    color: white;
}

.container {
    background: white;
    padding: 25px;
    margin: 20px auto;
    width: 90%;
    max-width: 600px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

    padding: 12px;
    margin: 10px 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    width: 45%;
}

.calc-btn {background:#2a5298;color:white;}

.card {
    background: white;

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="privacy.html">Privacy</a>
<a href="terms.html">Terms</a>
</div>

<div class="header">
<h1>Pump Power Calculator</h1>
<p>Hydraulic Power + Shaft Power + Motor Selection</p>
</div>

<div class="container">

<input type="number" id="rho" placeholder="Fluid Density (kg/m³)">
<input type="number" id="flow" placeholder="Flow Rate (m³/hr)">
<input type="number" id="head" placeholder="Head (m)">
<input type="number" id="eff" placeholder="Pump Efficiency (%)">
<input type="number" id="meff" placeholder="Motor Efficiency (%)">

<div style="text-align:center;">
<button class="calc-btn" onclick="calculate()">Calculate</button>
<button class="reset-btn" onclick="resetForm()">Reset</button>
</div>

</div>

<div id="output"></div>

<script>

function getMotorRating(power){
let motors = [0.75,1.1,1.5,2.2,3,4,5.5,7.5,11,15,18.5,22,30];

for(let i=0;i<motors.length;i++){
if(power <= motors[i]) return motors[i];
}
return ">30 kW (custom)";
}

function calculate(){

let rho = parseFloat(document.getElementById("rho").value);
let Q_hr = parseFloat(document.getElementById("flow").value);
let H = parseFloat(document.getElementById("head").value);
let eff = parseFloat(document.getElementById("eff").value);
let meff = parseFloat(document.getElementById("meff").value);

if(isNaN(rho)||isNaN(Q_hr)||isNaN(H)||isNaN(eff)||isNaN(meff)){
alert("Please fill all fields");
return;
}

if(rho<=0 || Q_hr<=0 || H<=0){
alert("Inputs must be greater than zero");
return;
}

if(eff<=0||eff>100||meff<=0||meff>100){
alert("Efficiency must be between 1 and 100%");
return;
}

// conversions
let Q = Q_hr / 3600; // m³/s
let g = 9.81;

// Hydraulic Power (kW)
let Ph = (rho * g * Q * H) / 1000;

// Shaft Power
let Ps = Ph / (eff / 100);

// Motor Power
let Pm = Ps / (meff / 100);

let motor = getMotorRating(Pm);

document.getElementById("output").innerHTML = `
<div class="card">
<h3>Results</h3>
<p><b>Hydraulic Power:</b> ${Ph.toFixed(2)} kW</p>
<p><b>Shaft Power:</b> ${Ps.toFixed(2)} kW</p>
<p><b>Motor Power:</b> ${Pm.toFixed(2)} kW</p>
<p><b>Selected Motor:</b> ${motor}</p>
</div>
`;
}

function resetForm(){
document.getElementById("rho").value="";
document.getElementById("flow").value="";
document.getElementById("head").value="";
document.getElementById("eff").value="";
document.getElementById("meff").value="";
document.getElementById("output").innerHTML="";
}

</script>

</body>
