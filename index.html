<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Industrial Calculation Hub | Engineering SaaS Tools</title>

<meta name="description" content="Professional engineering calculators, converters, and industrial design tools with real-time search and analysis dashboard.">
<meta name="keywords" content="engineering calculator, pump, pipe flow, heat transfer, converters, industrial tools">
<meta name="author" content="Industrial Calculation Hub">

<link rel="canonical" href="https://industrialcalculation.com/">

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1658062441623612"
crossorigin="anonymous"></script>

<!-- CMP -->
<script async src="https://fundingchoicesmessages.google.com/i/pub-1658062441623612?ers=1"></script>

<style>
body {
    margin: 0;
    font-family: Segoe UI, sans-serif;
    background: #0f172a;
    color: white;
}

/* APP LAYOUT */
.app {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: #111827;
    padding: 15px;
}

.sidebar h2 {
    color: #38bdf8;
    font-size: 20px;
}

.sidebar a {
    display: block;
    padding: 10px;
    margin: 5px 0;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    cursor: pointer;
}

.sidebar a:hover {
    background: #1f2937;
}

/* MAIN AREA */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* TOP BAR */
.topbar {
    background: #1e293b;
    padding: 10px;
    position: relative;
}

.topbar input {
    width: 60%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* AUTOSUGGEST */
#suggestBox {
    position: absolute;
    background: white;
    color: black;
    width: 60%;
    max-width: 400px;
    margin-top: 5px;
    border-radius: 8px;
    overflow: hidden;
    z-index: 1000;
}

#suggestBox div {
    padding: 10px;
    cursor: pointer;
}

#suggestBox div:hover {
    background: #eee;
}

/* CONTENT */
#content {
    padding: 20px;
    overflow-y: auto;
}

/* CARDS */
.card {
    display: block;
    background: #1f2937;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    color: white;
    text-decoration: none;
}

/* MOBILE */
@media(max-width: 800px){
    .sidebar { display:none; }
    .topbar input { width: 90%; }
    #suggestBox { width: 90%; }
}
</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>ICH Dashboard</h2>

<a onclick="loadPage('home')">🏠 Home</a>
<a onclick="loadPage('tools')">🔧 Tools</a>
<a onclick="loadPage('converters')">⚙️ Converters</a>
<a onclick="loadPage('blogs')">📘 Blogs</a>
<a onclick="showAnalytics()">📊 Analytics</a>

</div>

<!-- MAIN -->
<div class="main">

<!-- TOP SEARCH -->
<div class="topbar">
<input id="globalSearch" placeholder="Search tools (pump, flow, heat...)">
<div id="suggestBox"></div>
</div>

<!-- CONTENT -->
<div id="content">
<h2>Welcome to Industrial Calculation Hub</h2>
<p>Engineering tools, converters, and industrial knowledge system.</p>
</div>

</div>

</div>

<script>
/* =========================
   TOOL DATABASE
========================= */
const tools = [
 {name:"Pump Power Calculator", url:"pump-power-calculator.html", tag:"fluid"},
 {name:"Pipe Flow Calculator", url:"pipe-flow-calculator.html", tag:"fluid"},
 {name:"Air Density Calculator", url:"air-density.html", tag:"thermal"},
 {name:"Heat Transfer Tool", url:"heat-transfer.html", tag:"thermal"},
 {name:"Hopper Valley Angle Calculator", url:"hopper-valley-angle-calculator.html", tag:"mechanical"},
 {name:"Weight Conversion", url:"weight-conversion.html", tag:"converter"},
 {name:"Length Conversion", url:"length-conversion.html", tag:"converter"},
];

/* =========================
   PAGE LOADER (SaaS STYLE)
========================= */
function loadPage(page){

 let content = document.getElementById("content");

 if(page === "home"){
    content.innerHTML = "<h2>Dashboard</h2><p>Select tools from sidebar or search above.</p>";
 }

 if(page === "tools"){
    content.innerHTML = "<h2>Engineering Tools</h2>" +
    tools.filter(t=>t.tag!="converter").map(t =>
        `<a class='card' href='${t.url}' onclick="trackTool('${t.name}')">${t.name}</a>`
    ).join("");
 }

 if(page === "converters"){
    content.innerHTML = "<h2>Converters</h2>" +
    tools.filter(t=>t.tag=="converter").map(t =>
        `<a class='card' href='${t.url}' onclick="trackTool('${t.name}')">${t.name}</a>`
    ).join("");
 }

 if(page === "blogs"){
    content.innerHTML = `
    <h2>Engineering Blogs</h2>
    <a class='card' href='reynolds-number-explained.html'>Reynolds Number Explained</a>
    <a class='card' href='bernoulli-equation-explained.html'>Bernoulli Equation Explained</a>
    <a class='card' href='heat-transfer-explained.html'>Heat Transfer Explained</a>
    `;
 }
}

/* =========================
   GLOBAL SEARCH
========================= */
document.getElementById("globalSearch").addEventListener("keyup", function(e){
    let val = e.target.value.toLowerCase();

    let results = tools.filter(t =>
        t.name.toLowerCase().includes(val)
    );

    document.getElementById("content").innerHTML =
    "<h2>Search Results</h2>" +
    results.map(r =>
        `<a class='card' href='${r.url}' onclick="trackTool('${r.name}')">${r.name}</a>`
    ).join("");
});

/* =========================
   AUTO SUGGEST (YouTube style)
========================= */
document.getElementById("globalSearch").addEventListener("input", function(){
    let val = this.value.toLowerCase();
    let box = document.getElementById("suggestBox");

    if(!val){
        box.innerHTML = "";
        return;
    }

    let matches = tools.filter(t =>
        t.name.toLowerCase().includes(val)
    );

    box.innerHTML = matches.map(m =>
        `<div onclick="window.location='${m.url}'">${m.name}</div>`
    ).join("");
});

/* =========================
   ANALYTICS (LOCAL STORAGE)
========================= */
function trackTool(name){
    let data = JSON.parse(localStorage.getItem("usage") || "{}");
    data[name] = (data[name] || 0) + 1;
    localStorage.setItem("usage", JSON.stringify(data));
}

/* =========================
   SHOW ANALYTICS
========================= */
function showAnalytics(){
    let data = JSON.parse(localStorage.getItem("usage") || "{}");

    let html = "<h2>Tool Usage Analytics</h2>";

    for(let k in data){
        html += `<p>${k} → ${data[k]} clicks</p>`;
    }

    document.getElementById("content").innerHTML = html;
}
</script>

</body>
</html>
