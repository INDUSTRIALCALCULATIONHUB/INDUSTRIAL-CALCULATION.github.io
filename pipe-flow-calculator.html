<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pipe Flow Calculator | Industrial Calculation Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    color: white;
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    background: #1e3c72;
    padding: 12px;
    text-align: center;
}
.navbar a {
    color: white;
    margin: 8px;
    text-decoration: none;
}

/* CONTAINER */
.container {
    width: 80%;
    max-width: 600px;
    margin: 20px auto;
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
}

/* INPUT */
input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

/* REMOVE ARROWS */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
}
input[type=number] {
    -moz-appearance: textfield;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #1e3c72;
    color: white;
    border: none;
    cursor: pointer;
}

/* RESULT */
.result {
    margin-top: 15px;
    font-weight: bold;
}

/* FOOTER */
.footer {
    position: sticky;
    bottom: 0;
    background: #1e3c72;
    text-align: center;
    padding: 10px;
}
</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>

<div class="container">

<h2>Pipe Flow Calculator</h2>

<label>Select Calculation Type</label>
<select id="mode">
<option value="flow">Flow Rate (Q)</option>
<option value="velocity">Velocity (V)</option>
<option value="diameter">Diameter (D)</option>
</select>

<div id="inputs"></div>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

</div>

<div class="footer">
© 2026 Industrial Calculation Hub
</div>

<script>

function renderInputs() {
    let mode = document.getElementById("mode").value;
    let html = "";

    if(mode === "flow"){
        html = `
        Diameter (m): <input type="number" id="d">
        Velocity (m/s): <input type="number" id="v">
        `;
    }
    else if(mode === "velocity"){
        html = `
        Diameter (m): <input type="number" id="d">
        Flow Rate (m³/s): <input type="number" id="q">
        `;
    }
    else {
        html = `
        Flow Rate (m³/s): <input type="number" id="q">
        Velocity (m/s): <input type="number" id="v">
        `;
    }

    document.getElementById("inputs").innerHTML = html;
}

document.getElementById("mode").addEventListener("change", renderInputs);
renderInputs();

function calculate() {

    let mode = document.getElementById("mode").value;
    let result = "";

    if(mode === "flow"){
        let d = parseFloat(document.getElementById("d").value);
        let v = parseFloat(document.getElementById("v").value);

        let q = (Math.PI * d * d / 4) * v;
        result = "Flow Rate = " + q.toFixed(4) + " m³/s";
    }

    else if(mode === "velocity"){
        let d = parseFloat(document.getElementById("d").value);
        let q = parseFloat(document.getElementById("q").value);

        let v = q / (Math.PI * d * d / 4);
        result = "Velocity = " + v.toFixed(4) + " m/s";
    }

    else {
        let q = parseFloat(document.getElementById("q").value);
        let v = parseFloat(document.getElementById("v").value);

        let d = Math.sqrt((4*q)/(Math.PI*v));
        result = "Diameter = " + d.toFixed(4) + " m";
    }

    document.getElementById("result").innerHTML = result;
}

</script>

</body>
</html>
