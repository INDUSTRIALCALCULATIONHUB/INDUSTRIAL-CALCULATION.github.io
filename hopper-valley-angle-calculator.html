<script>

function renderInputs(){

    let mode = document.getElementById("mode").value;
    let html = "";

    if(mode === "angle"){
        html = `
        <label>Hopper Length (m)</label>
        <input type="number" id="L">

        <label>Hopper Width (m)</label>
        <input type="number" id="W">

        <label>Hopper Height (m)</label>
        <input type="number" id="H">
        `;
    }
    else{
        html = `
        <label>Hopper Length (m)</label>
        <input type="number" id="L">

        <label>Hopper Width (m)</label>
        <input type="number" id="W">

        <label>Valley Angle (deg)</label>
        <input type="number" id="A">
        `;
    }

    document.getElementById("inputs").innerHTML = html;
}

renderInputs();

function calculate(){

    let mode = document.getElementById("mode").value;

    let L = parseFloat(document.getElementById("L").value);
    let W = parseFloat(document.getElementById("W").value);

    if(isNaN(L) || isNaN(W)){
        document.getElementById("result").innerHTML = "Please enter valid values.";
        return;
    }

    let result = "";

    if(mode === "angle"){

        let H = parseFloat(document.getElementById("H").value);

        if(isNaN(H)){
            document.getElementById("result").innerHTML = "Please enter height.";
            return;
        }

        let angle = Math.atan((2*H)/W) * 180/Math.PI;

        let area = 2 * L * Math.sqrt((W/2)*(W/2) + H*H);
        let volume = (L * W * H) / 2;

        result =
        "Valley Angle = " + angle.toFixed(2) + "°<br>" +
        "Plate Surface Area = " + area.toFixed(2) + " m²<br>" +
        "Hopper Volume = " + volume.toFixed(2) + " m³";
    }
    else{

        let A = parseFloat(document.getElementById("A").value);

        if(isNaN(A)){
            document.getElementById("result").innerHTML = "Please enter angle.";
            return;
        }

        let H = (W/2) * Math.tan(A * Math.PI/180);

        let area = 2 * L * Math.sqrt((W/2)*(W/2) + H*H);
        let volume = (L * W * H) / 2;

        result =
        "Hopper Height = " + H.toFixed(2) + " m<br>" +
        "Plate Surface Area = " + area.toFixed(2) + " m²<br>" +
        "Hopper Volume = " + volume.toFixed(2) + " m³";
    }

    document.getElementById("result").innerHTML = result;
}

</script>
