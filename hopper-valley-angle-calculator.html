<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hopper Valley Angle Calculator | Industrial Calculation Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    color: white;
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    background: #1e3c72;
    padding: 12px;
    text-align: center;
}
.navbar a {
    color: white;
    margin: 8px;
    text-decoration: none;
}

/* CONTAINER */
.container {
    width: 80%;
    max-width: 600px;
    margin: 20px auto;
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
}

/* INPUT */
input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

/* REMOVE ARROWS */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
}
input[type=number] {
    -moz-appearance: textfield;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #1e3c72;
    color: white;
    border: none;
    cursor: pointer;
}

/* RESULT */
.result {
    margin-top: 15px;
    font-weight: bold;
    line-height: 1.6;
}

/* FOOTER */
.footer {
    position: sticky;
    bottom: 0;
    background: #1e3c72;
    text-align: center;
    padding: 10px;
}
</style>
</head>

<body>

<div class="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>

<div class="container">

<h2>Hopper Valley Angle Calculator</h2>

<label>Select Calculation Mode</label>
<select id="mode">
<option value="angle">Calculate Angle</option>
<option value="height">Calculate Height</option>
</select>

<div id="inputs"></div>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

</div>

<div class="footer">
© 2026 Industrial Calculation Hub
</div>

<script>

function renderInputs(){
    let mode = document.getElementById("mode").value;
    let html = "";

    if(mode === "angle"){
        html = `
        Hopper Length (m): <input type="number" id="L">
        Hopper Width (m): <input type="number" id="W">
        Hopper Height (m): <input type="number" id="H">
        `;
    } else {
        html = `
        Hopper Length (m): <input type="number" id="L">
        Hopper Width (m): <input type="number" id="W">
        Valley Angle (deg): <input type="number" id="A">
        `;
    }

    document.getElementById("inputs").innerHTML = html;
}

document.getElementById("mode").addEventListener("change", renderInputs);
renderInputs();

function calculate(){

    let mode = document.getElementById("mode").value;
    let result = "";

    let L = parseFloat(document.getElementById("L").value);
    let W = parseFloat(document.getElementById("W").value);

    if(mode === "angle"){
        let H = parseFloat(document.getElementById("H").value);

        let angle = Math.atan((2*H)/W) * 180/Math.PI;

        let area = 2 * L * Math.sqrt((W/2)*(W/2) + H*H);
        let volume = (L * W * H) / 2;

        result =
        "Valley Angle = " + angle.toFixed(2) + "°<br>" +
        "Plate Surface Area = " + area.toFixed(2) + " m²<br>" +
        "Hopper Volume = " + volume.toFixed(2) + " m³";
    }

    else {
        let A = parseFloat(document.getElementById("A").value);

        let H = (W/2) * Math.tan(A * Math.PI/180);

        let area = 2 * L * Math.sqrt((W/2)*(W/2) + H*H);
        let volume = (L * W * H) / 2;

        result =
        "Hopper Height = " + H.toFixed(2) + " m<br>" +
        "Plate Surface Area = " + area.toFixed(2) + " m²<br>" +
        "Hopper Volume = " + volume.toFixed(2) + " m³";
    }

    document.getElementById("result").innerHTML = result;
}

</script>

</body>
</html>
