<style>

<body>

<!-- FIXED HEADER -->
<div class="header-bar">
⚙️ Pressure Conversion Tool |
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>

<!-- MAIN CONTAINER -->
<div class="container">

<h2>📊 Pressure Unit Conversion</h2>

<input type="number" id="inputValue" placeholder="Enter Pressure Value">

<select id="unit">
    <option value="Pa">Pascal (Pa)</option>
    <option value="kPa">Kilopascal (kPa)</option>
    <option value="bar">Bar</option>
    <option value="atm">Atmosphere (atm)</option>
    <option value="psi">PSI (lb/in²)</option>
    <option value="mmWC">mm Water Column</option>
</select>

<div class="button-group">
<button class="calc-btn" onclick="calculate()">Calculate</button>
<button class="reset-btn" onclick="resetForm()">Reset</button>
</div>

<div id="output"></div>

</div>

<!-- FIXED FOOTER -->
<div class="footer-bar">
© 2026 Industrial Calculation Hub
</div>

<!-- CMP BANNER -->
<div id="consent-banner">
<p>This website uses cookies for analytics and personalized ads.</p>
<button class="accept" onclick="acceptConsent()">Accept</button>
<button class="reject" onclick="rejectConsent()">Reject</button>
<button class="manage" onclick="manageConsent()">Manage</button>
</div>

<script>

const TO_PASCAL = {
    Pa: 1,
    kPa: 1000,
    bar: 100000,
    atm: 101325,
    psi: 6894.76,
    mmWC: 9.80665
};

function calculate(){

    let value = parseFloat(document.getElementById("inputValue").value);
    let unit = document.getElementById("unit").value;

    if(isNaN(value)){
        document.getElementById("output").innerHTML =
        "<p style='color:red;text-align:center;'>Please enter valid value</p>";
        return;
    }

    let pa = value * TO_PASCAL[unit];

    let results = {
        "Pascal (Pa)": pa,
        "Kilopascal (kPa)": pa / 1000,
        "Bar": pa / 100000,
        "Atmosphere (atm)": pa / 101325,
        "PSI": pa / 6894.76,
        "mm Water Column": pa / 9.80665
    };

    let table = `<div class="card"><h3>Converted Values</h3><table>
    <tr><th>Unit</th><th>Value</th></tr>`;

    for(let k in results){
        table += `<tr><td>${k}</td><td>${results[k].toFixed(3)}</td></tr>`;
    }

    table += `</table></div>`;

    document.getElementById("output").innerHTML = table;
}

function resetForm(){
    document.getElementById("inputValue").value = "";
    document.getElementById("unit").value = "Pa";
    document.getElementById("output").innerHTML = "";
}

/* CMP */
function showBanner(){
    if(!localStorage.getItem("consent")){
        document.getElementById("consent-banner").style.display="block";
    }
}

function acceptConsent(){
    localStorage.setItem("consent","accepted");
    document.getElementById("consent-banner").style.display="none";
}

function rejectConsent(){
    localStorage.setItem("consent","rejected");
    document.getElementById("consent-banner").style.display="none";
}

function manageConsent(){
    alert("Open privacy settings page.");
}

window.onload = showBanner;

</script>

</body>
