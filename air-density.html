<!DOCTYPE html>
<html>
<head>
<title>Air Density Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Air Density Calculator</h1>

<p>This tool calculates air density using pressure and temperature.</p>

<br><br>

<h3 id="result"></h3>

<script src="script.js"></script>

</body>
